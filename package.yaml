name: proposal-model
version: 0.1.0
description: m30ml example project for rendering a proposal
author: Melanie Allen
license: CC-BY-4.0
packageManager: npm
workspaces:
  - ./packages/*
  - ./packages/@*/*
homepage: https://goldfishlaser.github.io/proposal-model
repository: https://github.com/goldfishlaser/proposal-model.git
m30pm:
  versionControlTool: git
  buildTool: gradle
  loggingLevel: error
dependencies:
  '@rse/nunjucks-cli': ^1.5.3
scripts:
  build: npm run clean && ./gradlew --offline build && cd build/ && asciidoctor proposal.adoc -o index.html
  clean: ./gradlew --offline clean
  readme: nunjucks -d package.json views/README.md.njk > README.md
